<!DOCTYPE html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo | Garcia Prints 3D</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

            id="pesquisa"

            <option>Todos</option>

            <option>Chaveiros</option>

            <option>Copos</option>

            <option>Decoração</option>

            <option>Geek</option>
